name: Publish release to PyPI

# Triggered when a GitHub release is published (i.e. you go to the repo's
# Releases page and click "Publish release" on a draft).
#
# The flow:
#   1. build-release-wheels.yml (manual) builds + smoke-tests the wheels
#      and sdist and attaches them to a *draft* release with the tag you
#      supplied. Re-running replaces the assets in place, so build
#      failures never leave a broken published release behind.
#   2. You review the draft in the GitHub UI, edit the notes, then click
#      "Publish release".
#   3. That click creates the git tag at target_commitish AND fires the
#      ``release: published`` event that runs this workflow.
#   4. This workflow downloads the assets already attached to the
#      now-published release and uploads them to PyPI with PEP 740
#      attestations. Nothing is compiled here — the wheels were built and
#      tested before the release was ever published.
on:
  release:
    types: [published]

# Opt JavaScript actions into the Node.js 24 runtime (Node 20 is
# deprecated 2026-06-02, removed 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/greybox
    permissions:
      id-token: write       # trusted publishing (OIDC)
      attestations: write   # PEP 740 / Sigstore attestations
      contents: read        # gh release download

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p dist
          # Pull every asset attached to the release into dist/ — the
          # wheels + sdist that build-release-wheels.yml staged on the
          # draft are the exact files we publish to PyPI.
          gh release download "$TAG" --repo "${{ github.repository }}" --dir dist
          ls -R dist/

      - name: Publish to PyPI (with PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # SLSA Build Level 3 in-toto attestation per file, signed via
          # Sigstore using the runner's OIDC identity.
          attestations: true
          # Retry-safe: re-running skips already-uploaded files instead
          # of failing the whole upload.
          skip-existing: true
